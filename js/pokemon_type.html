<!DOCTYPE html>
<html lang="ja">
	<head>
		<title>ポケモンタイプ相性検索</title>

		<meta property="og:type" content="article"/>
		<meta property="og:title" content="ポケモンタイプ相性検索"/>

    <style type="text/css">
      .main {
        max-width: 600px;
        margin: 10px auto;
        text-align: center;
        line-height: 2.0;
        font-family: sans-serif;
      }

      input[type="text"] {
        margin: 8px;
        padding: 4px;
        font-size: 105%;
      }

      select {
        margin: 4px;
        padding: 4px;
        font-size: 105%;
      }

      #search, #reset {
        width: 100px;
        margin-top: 10px;
        padding: 4px;
      }
      
      table {
        margin: 8px auto;
        padding: 0;
        width: 90%;
        border-collapse: collapse;
      }

      tr {
        margin: 0;
        padding: 0;
      }

      td {
        margin: 0;
        border: 1px solid #000000;
      }

      #x4, #x2, #x1_2, #x1_4, #x0 {
        text-align: left;
        padding-left: 8px;
        color: white;
      }

      .type-tag {
        display: inline-block;
        padding: 2px 8px;
        margin: 4px;
        border-radius: 20px;
        color: white;
        font-size: 80%;
        box-shadow:
          inset -2px -2px 2px rgba(0, 0, 0, 0.1),
          inset 2px 2px 2px rgba(255, 255, 255, 0.2);
      }

      .type-1   { background-color: #a8a87b } /* ノーマル */
      .type-2   { background-color: #ef7a30 } /* ほのお */
      .type-3   { background-color: #6a90ec } /* みず */
      .type-4   { background-color: #fcc536 } /* でんき */
      .type-5   { background-color: #67b041 } /* くさ */
      .type-6   { background-color: #41c1c8 } /* こおり */
      .type-7   { background-color: #bb372e } /* かくとう */
      .type-8   { background-color: #9b449d } /* どく */
      .type-9   { background-color: #9b5c33 } /* じめん */
      .type-10  { background-color: #947de0 } /* ひこう */
      .type-11  { background-color: #f15f88 } /* エスパー */
      .type-12  { background-color: #8f9b28 } /* むし */
      .type-13  { background-color: #907f2c } /* いわ */
      .type-14  { background-color: #6e5995 } /* ゴースト */
      .type-15  { background-color: #6c3cf2 } /* ドラゴン */
      .type-16  { background-color: #6f5849 } /* あく */
      .type-17  { background-color: #9494a6 } /* はがね */
      .type-18  { background-color: #da7f92 } /* フェアリー */

      details {
        padding: 10px;
        margin: 40px auto;
        width: 90%;
        color: #333;
        font-size: smaller;
        border: 2px solid #eee;
        border-radius: 10px;
        text-align: left;
      }

      .footer {
        margin-top: 40px;
        font-size: small;
        text-align: center;
      }

      @media screen and (max-width: 600px) {
        tr {
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="header"><img src="../img/pokemon_type.gif" height="14px">&nbsp;ポケモンタイプ相性検索</div>
		<hr>
    <div class="main">

        ポケモンの名前
        <input type="text" id="poke" autocomplete="off">
        <datalist id="names"></datalist><br>
        タイプ1
        <select name="type1" id="type1">
          <option value="0">-</option>

        <br>

          <option value="6">こおり</option>

        <input type="button" id="search" value="検索">
        &nbsp;&nbsp;
        <input type="button" id="reset" value="リセット" onclick="location.reload()">
      <!-- 本来ここに</form>があった -->
      <hr>
      <table>
        <tr bgcolor="lightpink">
          <td colspan="2">こうか ばつぐん</td>
        </tr>

          <td width="25%">4倍</td><td id="x4"></td>
        </tr>
        <tr>          
          <td>2倍</td><td id="x2"></td>
        </tr>
      </table>
      <table>
        <tr bgcolor="lightsteelblue">
          <td colspan="2">こうか いまひとつ</td>

          <td width="25%">1/2倍</td><td id="x1_2"></td>
        </tr>
        <tr>

      </table>
      <table>
        <tr bgcolor="silver">
          <td colspan="2">こうか なし</td>
        </tr>
        <tr>
          <td width="25%">0倍</td>
          <td id="x0"></td>
        </tr>
      </table>
      <details>
			  <summary>使い方</summary>
        ポケモンのタイプ相性を検索することができます。<br>
        ポケモンの名前を<b>入れない</b>場合、タイプのみでの相性が検索できます。<br>
        ポケモンの名前を入れた場合、そのポケモンへのタイプ相性が検索できます。
