      <hr>

        [6, 2, 0.5],  // こおり技はほのおタイプに0.5倍

        [7, 1, 2],    // かくとう技はノーマルタイプに2倍

        [8, 9, 0.5],  // どく技はじめんタイプに0.5倍
        [8, 13, 0.5], // どく技はいわタイプに0.5倍
        [8, 14, 0.5], // どく技はゴーストタイプに0.5倍
        [8, 17, 0],   // どく技ははがねタイプに無効
        [8, 18, 2],   // どく技はフェアリータイプに2倍

        [9, 2, 2],    // じめん技はほのおタイプに2倍
        [9, 4, 2],    // じめん技はでんきタイプに2倍
        [9, 5, 0.5],  // じめん技はくさタイプに0.5倍
        [9, 8, 2],    // じめん技はどくタイプに2倍
        [9, 10, 0],   // じめん技はひこうタイプに無効
        [9, 12, 0.5], // じめん技はむしタイプに0.5倍
        [9, 13, 2],   // じめん技はいわタイプに2倍

        [10, 4, 0.5],  // ひこう技はでんきタイプに0.5倍
        [10, 5, 2],    // ひこう技はくさタイプに2倍

        [12, 8, 0.5],  // むし技はどくタイプに0.5倍
        [12, 10, 0.5], // むし技はひこうタイプに0.5倍
        [12, 11, 2],   // むし技はエスパータイプに2倍
        [12, 14, 0.5], // むし技はゴーストタイプに0.5倍
        [12, 16, 2],   // むし技はあくタイプに2倍

        [13, 2, 2],    // いわ技はほのおタイプに2倍
        [13, 6, 2],    // いわ技はこおりタイプに2倍
        [13, 7, 0.5],  // いわ技はかくとうタイプに0.5倍
        [13, 9, 0.5],  // いわ技はじめんタイプに0.5倍
        [13, 10, 2],   // いわ技はひこうタイプに2倍
        [13, 12, 2],   // いわ技はむしタイプに2倍
        [13, 17, 0.5], // いわ技ははがねタイプに0.5倍

        [14, 1, 0],    // ゴースト技はノーマルタイプに無効
        [14, 11, 2],   // ゴースト技はエスパータイプに2倍
        [14, 14, 2],   // ゴースト技はゴーストタイプに2倍
        [14, 16, 0.5], // ゴースト技はあくタイプに0.5倍

        [15, 15, 2],   // ドラゴン技はドラゴンタイプに2倍
        [15, 17, 0.5], // ドラゴン技ははがねタイプに0.5倍
        [15, 18, 0],   // ドラゴン技はフェアリータイプに無効

        [16, 7, 0.5],  // あく技はかくとうタイプに0.5倍
        [16, 11, 2],   // あく技はエスパータイプに2倍
        [16, 14, 2],   // あく技はゴーストタイプに2倍
        [16, 16, 0.5], // あく技はあくタイプに0.5倍
        [16, 18, 0.5], // あく技はフェアリータイプに0.5倍

        [17, 2, 0.5],  // はがね技はほのおタイプに0.5倍
        [17, 3, 0.5],  // はがね技はみずタイプに0.5倍
        [17, 4, 0.5],  // はがね技はでんきタイプに0.5倍
        [17, 6, 2],    // はがね技はこおりタイプに2倍
        [17, 13, 2],   // はがね技はいわタイプに2倍
        [17, 17, 0.5], // はがね技ははがねタイプに0.5倍
        [17, 18, 2],   // はがね技はフェアリータイプに2倍

        [18, 2, 0.5],  // フェアリー技はほのおタイプに0.5倍
        [18, 7, 2],    // フェアリー技はかくとうタイプに2倍
        [18, 8, 0.5],  // フェアリー技はどくタイプに0.5倍
        [18, 15, 2],   // フェアリー技はドラゴンタイプに2倍
        [18, 16, 2],   // フェアリー技はあくタイプに2倍
        [18, 17, 0.5]  // フェアリー技ははがねタイプに0.5倍
      ]

      // 2.DOMの取得
      const type1 = document.getElementById("type1");
      const type2 = document.getElementById("type2");
      const search = document.getElementById("search");

      const x4 = document.getElementById("x4");
      const x2 = document.getElementById("x2");
      const x1_2 = document.getElementById("x1_2");
      const x1_4 = document.getElementById("x1_4");
      const x0 = document.getElementById("x0");

      // 3.関数
      function getRate(defId, atkId) {
        if (defId === 0) return 1; // 未選択は等倍扱い
        for (const row of typeChart) {
          if (row[0] === atkId && row[1] === defId) {
            return row[2];
          }
        }
        return 1; //見つからなければ等倍
      }

      // 4.イベント
      // 4-1.UI制御
      type1.onchange = () => {
        type2.disabled = (type1.value === 0);
        search.disabled = (type1.value === 0);
      };

      // 4-2.検索処理
      search.onclick = () => {
        if (type1.value === "0") return; // type1 が未選択なら何も起こらない

        const result = {
          x4: [],
          x2: [],
          x1_2: [],
          x1_4: [],
          x0: []
        };

        for (let atk = 1; atk <= 18; atk++) {
          const r1 = getRate(Number(type1.value), atk);
          const r2 = getRate(Number(type2.value), atk);
          const total = r1 * r2;

          switch (total) {
            case 4: result.x4.push(atk); break;
            case 2: result.x2.push(atk); break;
            case 0.5: result.x1_2.push(atk); break;
            case 0.25: result.x1_4.push(atk); break;
            case 0: result.x0.push(atk); break;
          }
        }

        x4.textContent = result.x4.map(id => typeNames[id]).join(" / ");
        x2.textContent = result.x2.map(id => typeNames[id]).join(" / ");
        x1_2.textContent = result.x1_2.map(id => typeNames[id]).join(" / ");
        x1_4.textContent = result.x1_4.map(id => typeNames[id]).join(" / ");
        x0.textContent = result.x0.map(id => typeNames[id]).join(" / ");
    };

    </script>
  </body>
</html>
