<!DOCTYPE html>
<html lang="ja">
	<head>
		<title>ポケモンタイプ相性検索</title>
		<meta charset="UTF-8">
		<meta name="description" content="ポケモンタイプ相性検索">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta property="og:url" content="https://yukai.yu-nagi.com/js/pokemon_type.html"/>
		<meta property="og:type" content="article"/>
		<meta property="og:title" content="ポケモンタイプ相性検索"/>
		<meta property="og:description" content="ポケモンのタイプを入れて検索すると、効率のいい攻撃タイプが分かります"/>
		<meta property="og:site_name" content="ポートフォリオ"/>
		<meta property="og:image" content="../img/★★★.png"/>
		<link rel="icon" href="https://yukai.yu-nagi.com/img/★★★.ico">

    <style type="text/css">
      .main {
        max-width: 600px;
        margin: 10px auto;
        text-align: center;
        line-height: 2.0;
      }

      select {
        margin: 4px;
        padding: 4px;
        font-size: 105%;
      }

      #search, #reset {
        width: 100px;
        margin-top: 10px;
        padding: 4px;
      }
      
      table {
        margin: 16px auto;
        width: 90%;
        empty-cells: show;
      }

      td {
        border: 1px solid #000000;
      }

      #x4, #x2, #x1_2, #x1_4, #x0 {
        text-align: left;
        padding-left: 8px;
      }

      .footer {
        margin-top: 40px;
        font-size: small;
        text-align: center;
      }

      @media screen and (max-width: 600px) {
        tr {
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="header">ポケモンタイプ相性検索</div>
		<hr>
    <div class="main">
      <form>
      <label>タイプ1</label>
        <select name="type1" id="type1">
          <option value="0">-</option>
          <option value="1">ノーマル</option>
          <option value="2">ほのお</option>
          <option value="3">みず</option>
          <option value="4">でんき</option>
          <option value="5">くさ</option>
          <option value="6">こおり</option>
          <option value="7">かくとう</option>
          <option value="8">どく</option>
          <option value="9">じめん</option>
          <option value="10">ひこう</option>
          <option value="11">エスパー</option>
          <option value="12">むし</option>
          <option value="13">いわ</option>
          <option value="14">ゴースト</option>
          <option value="15">ドラゴン</option>
          <option value="16">あく</option>
          <option value="17">はがね</option>
          <option value="18">フェアリー</option>
        </select>
        <br>
        <label>タイプ2</label>
        <select name="type2" id="type2" disabled>
          <option value="0">-</option>
          <option value="1">ノーマル</option>
          <option value="2">ほのお</option>
          <option value="3">みず</option>
          <option value="4">でんき</option>
          <option value="5">くさ</option>
          <option value="6">こおり</option>
          <option value="7">かくとう</option>
          <option value="8">どく</option>
          <option value="9">じめん</option>
          <option value="10">ひこう</option>
          <option value="11">エスパー</option>
          <option value="12">むし</option>
          <option value="13">いわ</option>
          <option value="14">ゴースト</option>
          <option value="15">ドラゴン</option>
          <option value="16">あく</option>
          <option value="17">はがね</option>
          <option value="18">フェアリー</option>
        </select><br>
        <input type="button" id="search"  value="検索">
        &nbsp;&nbsp;
        <button id="reset" onclick="location.reload">リセット</button>
      </form>
      <hr>
      <table>
        <tr bgcolor="lightpink">
          <td colspan="2">効果ばつぐん</td>
        </tr>
        <tr>
          <td width="25%">4倍</td><td id="x4"></td>
        </tr>
        <tr>          
          <td>2倍</td><td id="x2"></td>
        </tr>
      </table>
      <table>
        <tr bgcolor="lightsteelblue">
          <td colspan="2">効果いまひとつ</td>
        </tr>
        <tr>
          <td width="25%">1/2倍</td><td id="x1_2"></td>
        </tr>
        <tr>
          <td>1/4倍</td><td id="x1_4"></td>
        </tr>
      </table>
      <table>
        <tr bgcolor="silver">
          <td>効果なし</td>
        </tr>
        <tr>
          <td id="x0">&nbsp;</td>
        </tr>
      </table>

    </div>
